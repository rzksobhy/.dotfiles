# Font configuration (changes require restart)
font:
  # The normal (roman) font face to use.
  # Style can be specified to pick a specific face.
  normal:
    family: Jetbrains Mono Nerd Font
    style: Light

  # The bold font face
  bold:
    family: Jetbrains Mono Nerd Font
    style: Medium

  # The italic font face
  italic:
    family: Jetbrains Mono Nerd Font
    style: "Light Italic"

  # Point size of the font
  size: 11.0

# Colors (Gruvbox Material Medium Dark)
colors:
  # Default colors
  primary:
    background: '#282828'
    foreground: '#d4be98'

  # Normal colors
  normal:
    black:   '#3c3836'
    red:     '#ea6962'
    green:   '#a9b665'
    yellow:  '#d8a657'
    blue:    '#7daea3'
    magenta: '#d3869b'
    cyan:    '#89b482'
    white:   '#d4be98'

  # Bright colors (same as normal colors)
  bright:
    black:   '#3c3836'
    red:     '#ea6962'
    green:   '#a9b665'
    yellow:  '#d8a657'
    blue:    '#7daea3'
    magenta: '#d3869b'
    cyan:    '#89b482'
    white:   '#d4be98'
